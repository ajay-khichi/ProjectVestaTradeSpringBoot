name: Deploy VestaTrade

on:
  push:
    branches:
      - main

concurrency:
  group: vestatrade-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Application
        run: |
          mvn clean package -DskipTests

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          cat << 'EOF' > ~/.ssh/deploy_key
          ${{ secrets.DO_SSH_KEY }}
          EOF

          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Verify SSH Connection
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
            "echo Connected Successfully"

      - name: Upload JAR
        run: |
          scp \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            target/*.jar \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/opt/apps/vestatrade/app.jar

      - name: Restart Application
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
            "
            sudo systemctl daemon-reload &&
            sudo systemctl restart vestatrade
            "

      - name: Verify Service Status
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
            "
            sudo systemctl is-active vestatrade &&
            sudo systemctl --no-pager --lines=20 status vestatrade
            "
