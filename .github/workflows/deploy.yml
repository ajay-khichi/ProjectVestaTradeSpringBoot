name: Build and Deploy VestaTrade

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build JAR
      run: mvn -B package -DskipTests --file pom.xml

    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

    - name: Stop existing app
      run: |
        ssh -vvv -i ~/.ssh/id_ed25519 -p ${{ secrets.DO_PORT }} \
          -o StrictHostKeyChecking=no \
          ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
          "mkdir -p /opt/vestatrade && pkill -f vestatrade || true && sleep 2" 2>&1 || true

    - name: Upload JAR
      run: |
        scp -i ~/.ssh/id_ed25519 -P ${{ secrets.DO_PORT }} \
          -o StrictHostKeyChecking=no \
          target/*.jar \
          ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/opt/vestatrade/

    - name: Start Application
      run: |
        ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.DO_PORT }} \
          -o StrictHostKeyChecking=no \
          ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
          "cd /opt/vestatrade && nohup java -jar *.jar \
            --server.port=${{ secrets.SERVER_PORT }} \
            --spring.datasource.url=${{ secrets.DB_URL }} \
            --spring.datasource.username=${{ secrets.DB_USERNAME }} \
            --spring.datasource.password=${{ secrets.DB_PASSWORD }} \
            > app.log 2>&1 & echo 'VestaTrade started!'"

    - name: Verify Deployment
      run: |
        sleep 15
        ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.DO_PORT }} \
          -o StrictHostKeyChecking=no \
          ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
          "pgrep -f vestatrade && echo 'App is running!' || echo 'App failed to start!'"
