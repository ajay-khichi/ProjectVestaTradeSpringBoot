name: Build and Deploy VestaTrade

on:
  push:
    branches: [ "main" ]
# Sirf main branch pe push hone par trigger hoga

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# Node.js 24 use karo deprecated warning hatane ke liye

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # GitHub ka Ubuntu runner use karo

    steps:

    # Step 1: Code checkout
    # GitHub runner pe tumhara code download karta hai
    - uses: actions/checkout@v4

    # Step 2: Java 21 setup
    # Runner pe JDK 21 install karta hai + Maven cache
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Step 3: JAR build
    # mvn package = compile + test skip + JAR banana
    - name: Build JAR
      run: mvn -B package -DskipTests --file pom.xml

    # Step 4: SSH key setup
    # Private key file banao runner pe
    # ssh-keyscan = server fingerprint save karo (StrictHostKeyChecking ke liye)
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

    # Step 5: Purana app band karo
    # pkill -f = process naam se kill karo
    # || true = process na mile toh bhi fail mat ho
    - name: Stop existing app
      run: |
        ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.DO_PORT }} \
          -o StrictHostKeyChecking=no \
          ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
          "mkdir -p /opt/vestatrade && pkill -f ProjectVestaTrade || true && sleep 2"

    # Step 6: JAR upload
    # scp = secure copy
    # -P = port (capital P scp mein)
    # target/*.jar = build hua JAR
    # /opt/vestatrade/ = server pe destination
    - name: Upload JAR
      run: |
        scp -i ~/.ssh/id_ed25519 -P ${{ secrets.DO_PORT }} \
          -o StrictHostKeyChecking=no \
          target/*.jar \
          ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/opt/vestatrade/

    # Step 7: App start karo
    # nohup = SSH close hone pe bhi app chalta rahe
    # disown = process ko SSH session se detach karo
    # > app.log 2>&1 = stdout + stderr dono log mein
    # & = background mein run karo
    - name: Start Application
      run: |
        ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.DO_PORT }} \
          -o StrictHostKeyChecking=no \
          -o ServerAliveInterval=60 \
          ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
          "cd /opt/vestatrade && \
          nohup java -jar *.jar \
            --server.port=${{ secrets.SERVER_PORT }} \
            --spring.datasource.url=${{ secrets.DB_URL }} \
            --spring.datasource.username=${{ secrets.DB_USERNAME }} \
            --spring.datasource.password=${{ secrets.DB_PASSWORD }} \
            > app.log 2>&1 & \
          disown && exit 0"

    # Step 8: Verify
    # 20 sec wait karo app start hone ke liye
    # pgrep = process running hai ya nahi check karo
    - name: Verify Deployment
      run: |
        sleep 20
        ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.DO_PORT }} \
          -o StrictHostKeyChecking=no \
          ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
          "pgrep -f ProjectVestaTrade && echo '✅ VestaTrade is running!' || echo '❌ App failed to start!'"
