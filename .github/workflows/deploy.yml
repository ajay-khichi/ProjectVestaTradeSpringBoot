name: Deploy VestaTrade

on:
  push:
    branches:
      - main

concurrency:
  group: vestatrade-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build WAR
        run: mvn clean package -DskipTests

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          cat << 'EOF' > ~/.ssh/deploy_key
          ${{ secrets.DO_SSH_KEY }}
          EOF

          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Upload WAR
        run: |
          scp \
            -i ~/.ssh/deploy_key \
            target/*.war \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/opt/apps/vestatrade/app.war

      - name: Restart Service
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
            "sudo systemctl restart vestatrade"
