name: Build and Deploy VestaTrade

on:
  push:
    branches:
      - main

concurrency:
  group: vestatrade-production
  cancel-in-progress: true

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Application
        run: |
          mvn clean package -DskipTests

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          printf "%s" "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key

          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Create Deployment Directory
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.DO_PORT }} \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
            "mkdir -p /opt/vestatrade"

      - name: Upload New JAR
        run: |
          scp \
            -i ~/.ssh/deploy_key \
            -P ${{ secrets.DO_PORT }} \
            target/*.jar \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/opt/vestatrade/app.jar

      - name: Restart Service
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.DO_PORT }} \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
            "
            systemctl daemon-reload &&
            systemctl restart vestatrade &&
            systemctl is-active vestatrade
            "

      - name: Health Check
        run: |
          sleep 30

          curl --fail \
          http://${{ secrets.DO_HOST }}:8081 \
          || exit 1

      - name: Show Service Status
        if: always()
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.DO_PORT }} \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
            "
            systemctl status vestatrade --no-pager
            "
